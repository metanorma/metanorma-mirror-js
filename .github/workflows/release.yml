name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0-beta.1)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - name: Resolve version and dist-tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            prerelease="${version#*-}"
            dist_tag="${prerelease%%.*}"
            echo "dist-tag=${dist_tag}" >> "$GITHUB_OUTPUT"
          else
            echo "dist-tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Locate system Chrome for prepublishOnly e2e
        run: |
          chrome_path=$(readlink -f "$(which google-chrome || which google-chrome-stable)")
          echo "Resolved Chrome at: $chrome_path"
          echo "PUPPETEER_EXECUTABLE_PATH=$chrome_path" >> "$GITHUB_ENV"
      - name: Bump version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "${{ steps.version.outputs.version }}" ]; then
            npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          fi
      - run: npm publish --provenance --access public --tag ${{ steps.version.outputs.dist-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Determine tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
